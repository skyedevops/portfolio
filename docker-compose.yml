version: '3.8'

# Single unified container for portfolio app
# Usage:
#   Development:
#     docker-compose up
#   Or simply:
#     docker run -p 3001:3001 portfolio:latest

services:
  app:
    image: portfolio:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - portfolio

networks:
  portfolio:
    driver: bridge
